<section class="landing">
  <h2>Pacotes em destaque</h2>
  <div class="posts">
    <article class="post-card" *ngFor="let p of posts">
      <div class="thumb" *ngIf="p.image">
        <img [src]="p.image" [alt]="p.title" />
      </div>
      <div class="content">
        <h3>{{ p.title }}</h3>
        <p class="excerpt">{{ p.excerpt }}</p>
        <div class="meta">
          <span class="price">{{ p.price }}</span>
          <a class="cta" [routerLink]="['/']">Ver detalhes</a>
        </div>
      </div>
    </article>
  </div>
</section>
